<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

<!-- tailwind + daisyui -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- fonts -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<!-- css -->
<link rel="stylesheet" href="style.css">


</head>
<body>
     <section class="shadow-md rounded-lg max-w-md w-full justify-center mx-auto">
        <div class="text-center mx-auto  space-y-5 p-8 ">
    <div class="flex justify-center">
        <img src="assets/github-logo.png" alt="">
    </div>

   <div>
    <h1 class="text-3xl font-bold ">GitHub Issues Tracker</h1>
   <p class="text-[#64748B]">Sign in to manage your issues</p> </div>
    
    </div>

    <div class="flex justify-center mx-auto">
        <fieldset class="fieldset border-base-300 rounded-box max-w-md w-full p-8 ">

  <label class="label text-black font-medium">Username</label>
  <input id="username" type="text" class="input w-full" placeholder="Enter Username" />
  <p class="text-blue-800">Default: admin</p>

  <label class="label text-black font-medium">Password</label>
  <input id="password" type="password" class="input w-full" placeholder="Enter Password" />
  <p class="text-blue-800 ">Default: admin123</p>

  <button id="signBtn" class="btn btn-primary mt-4 w-full">Sign In</button>
</fieldset>
    </div>

        <div class="divider px-8">OR</div>
        
    <div class="space-y-4 text-center p-8 rounded-xl" >
        <h3 class="text-[#64748B]">Demo Credentials:</h3>
        <div class="bg-[#F8FAFC] p-6">
            <p><span class="font-semibold">Username:</span> admin</p>
            <p><span class="font-semibold">Password:</span> admin123</p>
        </div>
    </div>
    </section>


    <script src="script/script.js"></script>
</body>
</html>
