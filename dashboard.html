<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

<!-- tailwind + daisyui -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- fonts -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<!-- icons -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<!-- css -->
<link rel="stylesheet" href="style.css">

</head>
<body class="bg-base-200">
<section class="bg-base-100">
  <nav class="flex justify-between items-center w-11/12 mx-auto min-h-20 ">
    <div class="flex items-center  gap-1">
        <div>
        <img src="assets/github-logo_25231 1.png" alt="">
    </div>
  <div>
<h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
  </div> 
    </div>
 <div class="search flex gap-2 ">
  <div>
    <label class="input validator join-item">
      <i class="fa-solid fa-magnifying-glass"></i>
      
      <input type="text" placeholder="Search Issues" required />
    </label>
    <div class="validator-hint hidden">Enter valid  issue</div>
  </div>
  <button class="btn btn-primary join-item">New issue</button>
</div>    
</nav>
</section>

<section class="container mx-auto mt-14 flex items-center min-h-[88px] bg-base-100 rounded-lg">

  <div id="btn-container" class="flex gap-4 p-6 ">
    
  </div>
</section>

<section class="bg-base-100 min-h-[88px] container mx-auto mt-4 rounded-lg flex items-center">

  <div id="issues-length" class="flex justify-between items-center p-4 w-full">
    
    <!-- left -->
    <div id="issues-left" class="flex gap-3 items-center">
      <div class="bg-[#ECE4FF] w-[50px] h-[50px] rounded-full flex justify-center items-center">
        <img src="assets/Aperture.png" alt="">
      </div>
      <div>
        <h2 class="text-xl font-semibold">0 Issues</h2>
        <p class="text-[#64748B]">Track and manage your project issues</p>
      </div>
    </div>

    <!-- right -->
    <div id="issues-right" class="flex gap-4 text-sm ">
      <span class="flex items-center gap-1">
        <span class="w-2 h-2 bg-green-500 rounded-full"></span>Open
      </span>
      <span class="flex items-center gap-1">
        <span class="w-2 h-2 bg-purple-500 rounded-full"></span>Closed
      </span>
    </div>

  </div>
</section>


 <section
id="card-container"
class="max-w-7xl mx-auto mt-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"
>


</section>

    <script src="./script/script.js"></script>
</body>
</html>
